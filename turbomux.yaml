# turbomux configuration
# Place at ~/.config/turbomux/config.yaml or ./turbomux.yaml

# Default coding agent command to launch in new panes
# Options: "claude-yolo", "claude", "codex", "pi", "aider", or any custom command
# claude-yolo = claude --dangerously-skip-permissions
agent: claude-yolo

# Ticket tracker: "beads" (default, local) or "none" (use your own Linear/ClickUp/etc)
# When beads: turbomux spawn uses bd worktree create for shared ticket DB
# When none: just tmux panes, you coordinate however you want
tracker: beads

# Session name for agent windows
session: "0"

# Default window name for spawned agents
default_window: agents

# Pane layout when creating multi-pane windows
# Options: tiled, even-horizontal, even-vertical, main-horizontal, main-vertical
layout: tiled
